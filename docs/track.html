<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisbe - Panel de Proyectos</title>
    <link rel="icon" type="image/png" href="./assets/img/iconwisbe.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Raleway:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #31344b;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --accent-color: #6d5dfc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-family: 'Raleway', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        header p {
            font-weight: 400;
            opacity: 0.8;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .card {
            background-color: var(--bg-color);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            box-shadow: 9px 9px 16px var(--shadow-dark),
                        -9px -9px 16px var(--shadow-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card:hover {
            box-shadow: inset 9px 9px 16px var(--shadow-dark),
                        inset -9px -9px 16px var(--shadow-light);
            transform: scale(0.98);
        }

        .card i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--accent-color);
            text-shadow: 2px 2px 4px var(--shadow-dark),
                         -2px -2px 4px var(--shadow-light);
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 0.9rem;
            opacity: 0.7;
            line-height: 1.4;
        }

        .back-btn {
            margin-top: 50px;
            padding: 15px 30px;
            border-radius: 15px;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            box-shadow: 5px 5px 10px var(--shadow-dark),
                        -5px -5px 10px var(--shadow-light);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            box-shadow: inset 5px 5px 10px var(--shadow-dark),
                        inset -5px -5px 10px var(--shadow-light);
        }

        /* Branding */
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-container img {
            height: 100px;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            header h1 {
                font-size: 2rem;
            }
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="./assets/img/wisbelogo.png" alt="Wisbe Logo">
    </div>

    <header>
    </header>

    <div class="container">
        <!-- Gym Project -->
        <a href="migym.html" class="card">
            <i class="fas fa-dumbbell"></i>
            <h2>Luxury Gym</h2>
        </a>

        <!-- Beauty Salon Project -->
        <a href="estetica.html" class="card">
            <i class="fas fa-spa"></i>
            <h2>Estética & Salon</h2>
        </a>

        <!-- Construction Project -->
        <a href="construccionUSA.html" class="card">
            <i class="fas fa-hard-hat"></i>
            <h2>Construcción USA</h2>
        </a>

        <!-- Store Project -->
        <a href="mitienda.html" class="card">
            <i class="fas fa-shopping-bag"></i>
            <h2>Mi Tienda</h2>
        </a>
    </div>

    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Volver al Inicio
    </a>

    <script>
        // Simple interactive effects if needed
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function(e) {
                // Pre-navigation feedback can be added here
            });
        });
    </script>
</body>
</html>
